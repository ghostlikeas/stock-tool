<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票獲利試算小工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 480px;
            padding: 30px;
        }
        h1 {
            font-size: 24px;
            color: #1e293b;
            text-align: center;
            margin-bottom: 24px;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
            outline: none;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 4px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: normal;
            cursor: pointer;
        }
        .radio-label input {
            width: auto;
            margin-right: 6px;
        }
        .result-card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin-top: 24px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #e2e8f0;
        }
        .result-row:last-child {
            border-bottom: none;
        }
        .result-label {
            font-size: 14px;
            color: #64748b;
        }
        .result-value {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }
        .profit {
            color: #dc2626; /* 台灣習慣紅色為上漲/獲利 */
        }
        .loss {
            color: #16a34a; /* 綠色為下跌 */
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>股票獲利試算小工具</h1>
    
    <div class="form-group">
        <label for="buyPrice">買進價格 (元)</label>
        <input type="number" id="buyPrice" value="115" step="any" placeholder="請輸入買進價格">
    </div>
    
    <div class="form-group">
        <label for="sellPrice">預計賣出價格 (元)</label>
        <input type="number" id="sellPrice" value="136" step="any" placeholder="請輸入賣出價格">
    </div>
    
    <div class="form-group">
        <label for="shares">購買數量</label>
        <div style="display: flex; gap: 10px; width: 100%;">
            <input type="number" id="quantity" value="1" style="flex: 2;">
            <select id="unit" style="flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; background: white;">
                <option value="1000" selected>張 (1000股)</option>
                <option value="1">股 (零股)</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>手續費折扣 (台灣一般券商)</label>
        <select id="discount" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; outline: none; background: white;">
            <option value="1">不打折 (1.425‰)</option>
            <option value="0.6">6 折</option>
            <option value="0.28" selected>28 折 (常見網路下單優惠)</option>
            <option value="0">免手續費 (純看價差)</option>
        </select>
    </div>

    <div class="result-card">
        <div class="result-row">
            <span class="result-label">帳面單股價差</span>
            <span id="priceDiff" class="result-value">0 元</span>
        </div>
        <div class="result-row">
            <span class="result-label">精準報酬率 (含稅費)</span>
            <span id="roi" class="result-value">0%</span>
        </div>
        <div class="result-row">
            <span class="result-label">預估淨獲利金額</span>
            <span id="netProfit" class="result-value" style="font-size: 22px;">0 元</span>
        </div>
    </div>
    
    <div class="footer">
        手續費 0.1425% (基本低消20元) | 證交稅 0.3%
    </div>
</div>

<script>
    const buyPriceInput = document.getElementById('buyPrice');
    const sellPriceInput = document.getElementById('sellPrice');
    const quantityInput = document.getElementById('quantity');
    const unitSelect = document.getElementById('unit');
    const discountSelect = document.getElementById('discount');

    function calculate() {
        const buyPrice = parseFloat(buyPriceInput.value) || 0;
        const sellPrice = parseFloat(sellPriceInput.value) || 0;
        const quantity = parseFloat(quantityInput.value) || 0;
        const totalShares = quantity * parseInt(unitSelect.value);
        const discount = parseFloat(discountSelect.value);

        if (buyPrice <= 0 || sellPrice <= 0 || totalShares <= 0) {
            document.getElementById('priceDiff').innerText = '0 元';
            document.getElementById('roi').innerText = '0%';
            document.getElementById('netProfit').innerText = '0 元';
            return;
        }

        // 1. 價差
        const diff = sellPrice - buyPrice;
        const diffText = (diff >= 0 ? '+' : '') + diff.toFixed(2) + ' 元';
        document.getElementById('priceDiff').innerText = diffText;
        if(diff >= 0) {
            document.getElementById('priceDiff').className = 'result-value profit';
        } else {
            document.getElementById('priceDiff').className = 'result-value loss';
        }

        // 2. 計算精準稅費
        // 買進手續費 (低消 20 元)
        let buyFee = Math.floor(buyPrice * totalShares * 0.001425 * discount);
        if (buyFee < 20 && discount > 0) buyFee = 20;
        const totalCost = (buyPrice * totalShares) + buyFee;

        // 賣出手續費 (低消 20 元)
        let sellFee = Math.floor(sellPrice * totalShares * 0.001425 * discount);
        if (sellFee < 20 && discount > 0) sellFee = 20;
        // 證交稅 0.3%
        const tax = Math.floor(sellPrice * totalShares * 0.003);
        
        const totalRevenue = (sellPrice * totalShares) - sellFee - tax;

        // 3. 淨獲利與報酬率
        const netProfit = totalRevenue - totalCost;
        const roi = (netProfit / totalCost) * 100;

        // 顯示淨獲利
        document.getElementById('netProfit').innerText = (netProfit >= 0 ? '+' : '') + netProfit.toLocaleString('zh-TW') + ' 元';
        if(netProfit >= 0) {
            document.getElementById('netProfit').className = 'result-value profit';
            document.getElementById('roi').className = 'result-value profit';
        } else {
            document.getElementById('netProfit').className = 'result-value loss';
            document.getElementById('roi').className = 'result-value loss';
        }

        // 顯示報酬率
        document.getElementById('roi').innerText = (roi >= 0 ? '+' : '') + roi.toFixed(2) + '%';
    }

    // 監聽所有欄位輸入
    [buyPriceInput, sellPriceInput, quantityInput, unitSelect, discountSelect].forEach(element => {
        element.addEventListener('input', calculate);
    });

    // 初始計算一次
    calculate();
</script>

</body>
</html>
