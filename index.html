<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻糬股票獲利試算</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}

body{
    background-color:#fef8f3;
    color:#3e3e3e;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:#ffffff;
    border-radius:20px;
    box-shadow:0 8px 30px rgba(0,0,0,0.05);
    width:100%;
    max-width:480px;
    padding:0 0 30px 0;
    border:2px solid #ffd8a8;
    overflow:hidden;
}

.content-padding{
    padding:0 25px;
}

.header-section{
    text-align:center;
    margin-bottom:15px;
}

.cat-image-wrapper{
    width:100%;
    margin:0 auto 15px auto;
    overflow:hidden;
    background-color:#fff;
    aspect-ratio:16/9;
    padding:0 25px;
    margin-top:25px;
}

.cat-image-wrapper img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    border-radius:16px;
}

h1{
    font-size:24px;
    color:#d9480f;
    text-align:center;
    margin-bottom:5px;
    font-weight:800;
}

.subtitle{
    font-size:13px;
    color:#868e96;
    margin-top:5px;
}

.tabs-menu{
    display:flex;
    background:#f8f9fa;
    border-bottom:2px solid #ffd8a8;
    margin-bottom:20px;
}

.tab-btn{
    flex:1;
    padding:12px 5px;
    text-align:center;
    background:none;
    border:none;
    font-size:14px;
    font-weight:600;
    color:#868e96;
    cursor:pointer;
    transition:all 0.2s;
}

.tab-btn.active{
    color:#d9480f;
    background:#fff;
    border-bottom:3px solid #d9480f;
    margin-bottom:-2px;
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    font-size:14px;
    font-weight:600;
    color:#616161;
    margin-bottom:6px;
}

.input-with-icon{
    position:relative;
    display:flex;
    align-items:center;
}

input,select{
    width:100%;
    padding:12px 15px;
    border:2px solid #e9ecef;
    border-radius:12px;
    font-size:15px;
    transition:all 0.2s ease;
    outline:none;
    color:#495057;
}

input:focus,select:focus{
    border-color:#ffd8a8;
    box-shadow:0 0 0 4px rgba(255,169,77,0.1);
}

.input-with-icon span.paw-icon{
    position:absolute;
    right:15px;
    color:#ffd8a8;
    font-size:18px;
    pointer-events:none;
}

.stock-fetch-btn{
    background:#fff3bf;
    border:2px solid #fab005;
    color:#873800;
    padding:12px 15px;
    border-radius:12px;
    margin-left:8px;
    font-weight:bold;
    cursor:pointer;
    white-space:nowrap;
}

.stock-fetch-btn:hover{
    background:#ffe066;
}

.action-btn{
    width:100%;
    background:#ff922b;
    color:white;
    border:none;
    padding:12px;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition:background 0.2s;
}

.action-btn:hover{
    background:#f76707;
}

.result-card{
    background-color:#fff9f1;
    border:2px solid #ffd8a8;
    border-radius:15px;
    padding:18px;
    margin-top:20px;
}

.result-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px dashed #ffd8a8;
}

.result-row:last-child{
    border-bottom:none;
}

.result-label{
    font-size:14px;
    color:#616161;
}

.result-value{
    font-size:18px;
    font-weight:700;
}

.profit{
    color:#e03131;
}

.loss{
    color:#2b8a3e;
}

.history-list{
    margin-top:15px;
    max-height:250px;
    overflow-y:auto;
}

.history-item{
    background:#f8f9fa;
    border:1px solid #e9ecef;
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:8px;
    font-size:13px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.del-btn{
    background:none;
    border:none;
    color:#adb5bd;
    cursor:pointer;
    font-size:18px;
}

.del-btn:hover{
    color:#fa5252;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    color:#868e96;
    line-height:1.5;
}
</style>
</head>

<body>

<div class="container">

    <div class="header-section">

        <div class="cat-image-wrapper">
            <img src="mochi.png" alt="招財麻糬" onerror="this.style.display='none';">
        </div>

        <h1>麻糬股票獲利試算</h1>

        <div class="subtitle">
            喵～麻糬今天也陪你看盤算罐罐！🐾
        </div>

    </div>

    <div class="tabs-menu">

        <button class="tab-btn active" onclick="switchTab(event,'tab1')">
            基礎試算
        </button>

        <button class="tab-btn" onclick="switchTab(event,'tab2')">
            目標價反推
        </button>

        <button class="tab-btn" onclick="switchTab(event,'tab3')">
            即時現價算
        </button>

    </div>

    <div class="content-padding">

        <!-- TAB1 -->
        <div id="tab1" class="tab-content active">

            <div class="form-group">
                <label>股票名稱 / 備註</label>
                <input type="text" id="t1_note" placeholder="例如：台積電 / 波段單">
            </div>

            <div class="form-group">
                <label>買進價格 (元)</label>

                <div class="input-with-icon">
                    <input type="number" id="t1_buy" placeholder="請輸入買入價格">
                    <span class="paw-icon">🐾</span>
                </div>
            </div>

            <div class="form-group">
                <label>預計賣出價格 (元)</label>

                <div class="input-with-icon">
                    <input type="number" id="t1_sell" placeholder="請輸入賣出價格">
                    <span class="paw-icon">🐾</span>
                </div>
            </div>

            <div class="form-group">
                <label>購買張數（可輸入零股，例如 0.1）</label>
                <input type="number" id="t1_qty" value="1" step="0.001">
            </div>

            <button class="action-btn" onclick="saveToHistory('tab1')">
                🐾 記錄這筆試算
            </button>

        </div>

        <!-- TAB2 -->
        <div id="tab2" class="tab-content">

            <div class="form-group">
                <label>股票名稱 / 備註</label>
                <input type="text" id="t2_note" placeholder="例如：0050 / 存股">
            </div>

            <div class="form-group">
                <label>買進價格 (元)</label>

                <div class="input-with-icon">
                    <input type="number" id="t2_buy" placeholder="請輸入買入價格">
                    <span class="paw-icon">🐾</span>
                </div>
            </div>

            <div class="form-group">
                <label>期望報酬率 (%)</label>

                <div class="input-with-icon">
                    <input type="number" id="t2_target_roi" placeholder="例如輸入 20">
                    <span class="paw-icon">📈</span>
                </div>
            </div>

            <div class="form-group">
                <label>購買張數（可輸入零股，例如 0.1）</label>
                <input type="number" id="t2_qty" value="1" step="0.001">
            </div>

            <div class="result-card" style="background-color:#fff5f5;border-color:#ffc9c9;margin-bottom:10px;">

                <div class="result-row">

                    <span class="result-label" style="font-weight:bold;color:#c92a2a;">
                        🎯 麻糬反推目標賣出價
                    </span>

                    <span id="t2_suggest_sell" class="result-value profit" style="font-size:22px;">
                        0 元
                    </span>

                </div>

            </div>

            <button class="action-btn" onclick="saveToHistory('tab2')">
                🐾 記錄反推結果
            </button>

        </div>

        <!-- TAB3 -->
        <div id="tab3" class="tab-content">

            <div class="form-group">
                <label>台灣股票代號</label>

                <div style="display:flex;">

                    <input type="text" id="t3_code" placeholder="例如: 2330">

                    <button class="stock-fetch-btn" onclick="fetchStockPrice()">
                        抓取現價
                    </button>

                </div>

            </div>

            <div class="form-group">
                <label>股票名稱 / 備註</label>
                <input type="text" id="t3_note" placeholder="例如：聯發科 / 當沖">
            </div>

            <div class="form-group">
                <label>即時買進現價 (元)</label>

                <div class="input-with-icon">
                    <input type="number" id="t3_buy" placeholder="點上方按鈕可自動帶入">
                    <span class="paw-icon">💰</span>
                </div>
            </div>

            <div class="form-group">
                <label>預計賣出價格 (元)</label>

                <div class="input-with-icon">
                    <input type="number" id="t3_sell" placeholder="請輸入賣出價格">
                    <span class="paw-icon">🐾</span>
                </div>
            </div>

            <div class="form-group">
                <label>購買張數（可輸入零股，例如 0.1）</label>
                <input type="number" id="t3_qty" value="1" step="0.001">
            </div>

            <button class="action-btn" onclick="saveToHistory('tab3')">
                🐾 記錄現價試算
            </button>

        </div>

        <!-- 手續費 -->
        <div class="form-group" style="margin-top:15px;">

            <label>手續費折扣</label>

            <select id="global_discount">

                <option value="1">
                    不打折 (1.425‰)
                </option>

                <option value="0.6">
                    6 折
                </option>

                <option value="0.28" selected>
                    28 折 (網路下單)
                </option>

                <option value="0">
                    免手續費
                </option>

            </select>

        </div>

        <!-- 結果 -->
        <div class="result-card">

            <div class="result-row">
                <span class="result-label">帳面單股價差</span>
                <span id="res_diff" class="result-value">0 元</span>
            </div>

            <div class="result-row">
                <span class="result-label">精準報酬率 (含稅費)</span>
                <span id="res_roi" class="result-value">0%</span>
            </div>

            <div class="result-row">
                <span class="result-label">預估淨獲利金額</span>
                <span id="res_net" class="result-value profit" style="font-size:22px;">
                    0 元
                </span>
            </div>

        </div>

        <!-- 歷史紀錄 -->
        <div style="margin-top:25px;">

            <label style="display:flex;justify-content:space-between;">

                <span>🐾 麻糬的最近10筆記帳本</span>

                <span style="font-size:11px;color:#adb5bd;font-weight:normal;">
                    自動儲存
                </span>

            </label>

            <div class="history-list" id="history_container"></div>

        </div>

        <div class="footer">
            手續費 0.1425% (低消20元) | 證交稅 0.3%<br>
            支援零股試算 📈
        </div>

    </div>

</div>

<script>

let currentActiveTab = 'tab1';

let historyRecords =
    JSON.parse(localStorage.getItem('mochi_stock_history')) || [];


function switchTab(event, tabId){

    currentActiveTab = tabId;

    document.querySelectorAll('.tab-btn')
        .forEach(btn => btn.classList.remove('active'));

    document.querySelectorAll('.tab-content')
        .forEach(tab => tab.classList.remove('active'));

    event.target.classList.add('active');

    document.getElementById(tabId)
        .classList.add('active');

    globalCalculate();
}


async function fetchStockPrice(){

    const code =
        document.getElementById('t3_code')
        .value
        .trim();

    if(!code){
        alert('請先輸入股票代號喔！');
        return;
    }

    const btn =
        document.querySelector('.stock-fetch-btn');

    btn.innerText = '讀取中...';

    btn.disabled = true;

    try{

        const response = await fetch(
            `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_${code}.tw&json=1&delay=0`
        );

        const data = await response.json();

        if(
            !data.msgArray ||
            data.msgArray.length === 0
        ){
            throw new Error('查無資料');
        }

        const stock = data.msgArray[0];

        const price =
            parseFloat(stock.z) ||
            parseFloat(stock.y);

        if(!price){
            throw new Error('價格不存在');
        }

        document.getElementById('t3_buy').value = price;

        document.getElementById('t3_note').value =
            stock.n;

        alert(`成功抓取 ${stock.n} 現價：${price} 元`);

        document.getElementById('t3_sell').focus();

        globalCalculate();

    }catch(error){

        console.error(error);

        alert(
            '股票現價抓取失敗\n\n可能原因：\n1. 股票代號錯誤\n2. API 暫時異常\n3. 網路問題'
        );

    }finally{

        btn.innerText = '抓取現價';

        btn.disabled = false;

    }

}


function globalCalculate(){

    let buy = 0;
    let sell = 0;
    let qty = 1;

    const discount =
        parseFloat(
            document.getElementById('global_discount').value
        );

    if(currentActiveTab === 'tab1'){

        buy =
            parseFloat(document.getElementById('t1_buy').value) || 0;

        sell =
            parseFloat(document.getElementById('t1_sell').value) || 0;

        qty =
            parseFloat(document.getElementById('t1_qty').value) || 1;

    }

    else if(currentActiveTab === 'tab2'){

        buy =
            parseFloat(document.getElementById('t2_buy').value) || 0;

        const targetRoi =
            parseFloat(document.getElementById('t2_target_roi').value) || 0;

        qty =
            parseFloat(document.getElementById('t2_qty').value) || 1;

        if(buy > 0){

            const tCostFactor =
                1 + (0.001425 * discount);

            const tRevFactor =
                1 - (0.001425 * discount) - 0.003;

            sell =
                (buy * tCostFactor * (1 + targetRoi / 100))
                / tRevFactor;

            document.getElementById('t2_suggest_sell').innerText =
                sell.toFixed(2) + ' 元';

        }else{

            document.getElementById('t2_suggest_sell').innerText =
                '0 元';

        }

    }

    else if(currentActiveTab === 'tab3'){

        buy =
            parseFloat(document.getElementById('t3_buy').value) || 0;

        sell =
            parseFloat(document.getElementById('t3_sell').value) || 0;

        qty =
            parseFloat(document.getElementById('t3_qty').value) || 1;

    }

    const totalShares = qty * 1000;

    if(buy <= 0 || sell <= 0){

        document.getElementById('res_diff').innerText = '0 元';
        document.getElementById('res_roi').innerText = '0%';
        document.getElementById('res_net').innerText = '0 元';

        return;
    }

    const diff = sell - buy;

    document.getElementById('res_diff').innerText =
        (diff >= 0 ? '+' : '') +
        diff.toFixed(2) +
        ' 元';

    document.getElementById('res_diff').className =
        'result-value ' +
        (diff >= 0 ? 'profit' : 'loss');

    let buyFee =
        Math.floor(
            buy * totalShares * 0.001425 * discount
        );

    if(buyFee < 20 && discount > 0){
        buyFee = 20;
    }

    const totalCost =
        (buy * totalShares) + buyFee;

    let sellFee =
        Math.floor(
            sell * totalShares * 0.001425 * discount
        );

    if(sellFee < 20 && discount > 0){
        sellFee = 20;
    }

    const tax =
        Math.floor(
            sell * totalShares * 0.003
        );

    const totalRevenue =
        (sell * totalShares)
        - sellFee
        - tax;

    const netProfit =
        totalRevenue - totalCost;

    const roi =
        (netProfit / totalCost) * 100;

    document.getElementById('res_net').innerText =
        (netProfit >= 0 ? '+' : '') +
        Math.round(netProfit).toLocaleString('zh-TW') +
        ' 元';

    document.getElementById('res_roi').innerText =
        (roi >= 0 ? '+' : '') +
        roi.toFixed(2) +
        '%';

    const stateClass =
        netProfit >= 0
        ? 'result-value profit'
        : 'result-value loss';

    document.getElementById('res_net').className =
        stateClass;

    document.getElementById('res_roi').className =
        stateClass;
}


function saveToHistory(tabId){

    let buy = 0;
    let sell = 0;
    let qty = 1;
    let note = '';

    if(tabId === 'tab1'){

        buy =
            parseFloat(document.getElementById('t1_buy').value) || 0;

        sell =
            parseFloat(document.getElementById('t1_sell').value) || 0;

        qty =
            parseFloat(document.getElementById('t1_qty').value) || 1;

        note =
            document.getElementById('t1_note').value.trim();

    }

    else if(tabId === 'tab2'){

        buy =
            parseFloat(document.getElementById('t2_buy').value) || 0;

        sell =
            parseFloat(document.getElementById('t2_suggest_sell').innerText) || 0;

        qty =
            parseFloat(document.getElementById('t2_qty').value) || 1;

        note =
            document.getElementById('t2_note').value.trim();

    }

    else if(tabId === 'tab3'){

        buy =
            parseFloat(document.getElementById('t3_buy').value) || 0;

        sell =
            parseFloat(document.getElementById('t3_sell').value) || 0;

        qty =
            parseFloat(document.getElementById('t3_qty').value) || 1;

        note =
            document.getElementById('t3_note').value.trim();

    }

    if(buy <= 0 || sell <= 0){

        alert('數據不完整，麻糬沒辦法記帳喔！');

        return;
    }

    const netStr =
        document.getElementById('res_net').innerText;

    const roiStr =
        document.getElementById('res_roi').innerText;

    const record = {

        id: Date.now(),

        label:
            `${note || '股票'} (${buy} ➜ ${sell.toFixed(2)})`,

        qty:
            `${qty} 張 (${Math.round(qty * 1000)} 股)`,

        result:
            `${netStr} (${roiStr})`,

        isProfit:
            !netStr.includes('-')
    };

    historyRecords.unshift(record);

    if(historyRecords.length > 10){
        historyRecords.pop();
    }

    localStorage.setItem(
        'mochi_stock_history',
        JSON.stringify(historyRecords)
    );

    renderHistory();
}


function deleteHistory(id){

    historyRecords =
        historyRecords.filter(r => r.id !== id);

    localStorage.setItem(
        'mochi_stock_history',
        JSON.stringify(historyRecords)
    );

    renderHistory();
}


function renderHistory(){

    const container =
        document.getElementById('history_container');

    if(historyRecords.length === 0){

        container.innerHTML =
            '<div style="text-align:center;font-size:12px;color:#adb5bd;padding:10px;">目前尚無記帳紀錄 🐾</div>';

        return;
    }

    container.innerHTML =
        historyRecords.map(r => `

            <div class="history-item">

                <div>

                    <strong>${r.label}</strong><br>

                    ${r.qty}<br>

                    <span class="${r.isProfit ? 'profit' : 'loss'}">
                        ${r.result}
                    </span>

                </div>

                <button class="del-btn" onclick="deleteHistory(${r.id})">
                    ×
                </button>

            </div>

        `).join('');
}


const inputs = [

    't1_buy',
    't1_sell',
    't1_qty',

    't2_buy',
    't2_target_roi',
    't2_qty',

    't3_buy',
    't3_sell',
    't3_qty',

    'global_discount'

];

inputs.forEach(id => {

    document.getElementById(id)
        .addEventListener('input', globalCalculate);

});

renderHistory();

</script>

</body>
</html>
