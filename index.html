<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻糬股票獲利試算</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #fef8f3;
            color: #3e3e3e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 480px;
            padding: 30px;
            border: 2px solid #ffd8a8;
        }
        h1 {
            font-size: 26px;
            color: #d9480f;
            text-align: center;
            margin-bottom: 5px;
            font-weight: 800;
        }
        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }
        /* 專屬麻糬圖片樣式 */
        .cat-image-wrapper {
            width: 100%;
            max-width: 280px;
            margin: 0 auto 15px auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(217, 72, 15, 0.1);
            border: 3px solid #ffd8a8;
            background-color: #fff;
            aspect-ratio: 16 / 9; /* 完美契合圖片比例 */
        }
        .cat-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .subtitle {
            font-size: 14px;
            color: #868e96;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: #616161;
            margin-bottom: 8px;
        }
        .input-with-icon {
            position: relative;
            display: flex;
            align-items: center;
        }
        input, select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s ease;
            outline: none;
            color: #495057;
        }
        input::placeholder {
            color: #adb5bd;
        }
        input:focus, select:focus {
            border-color: #ffd8a8;
            box-shadow: 0 0 0 4px rgba(255, 169, 77, 0.1);
        }
        .input-with-icon span.paw-icon {
            position: absolute;
            right: 15px;
            color: #ffd8a8;
            font-size: 20px;
            pointer-events: none;
        }
        .result-card {
            background-color: #fff9f1;
            border: 2px solid #ffd8a8;
            border-radius: 15px;
            padding: 22px;
            margin-top: 25px;
            position: relative;
        }
        .result-card::after {
            content: '🐾';
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 18px;
            color: #f76707;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #ffd8a8;
        }
        .result-row:last-child {
            border-bottom: none;
        }
        .result-label {
            font-size: 15px;
            color: #616161;
            font-weight: 500;
        }
        .result-value {
            font-size: 19px;
            font-weight: 700;
            color: #212529;
        }
        .profit {
            color: #e8590c;
        }
        .loss {
            color: #12b886;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #868e96;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <!-- 這裡會直接讀取同目錄下的 mochi.png -->
        <div class="cat-image-wrapper">
            <img src="mochi.png" alt="招財麻糬" onerror="this.style.display='none';">
        </div>
        <h1>麻糬股票獲利試算</h1>
        <div class="subtitle">喵～麻糬幫你看看這檔能賺多少罐罐！</div>
    </div>
    
    <div class="form-group">
        <label for="buyPrice">買進價格 (元)</label>
        <div class="input-with-icon">
            <input type="number" id="buyPrice" value="" step="any" placeholder="請輸入買入價格">
            <span class="paw-icon">🐾</span>
        </div>
    </div>
    
    <div class="form-group">
        <label for="sellPrice">預計賣出價格 (元)</label>
        <div class="input-with-icon">
            <input type="number" id="sellPrice" value="" step="any" placeholder="請輸入賣出價格">
            <span class="paw-icon">🐾</span>
        </div>
    </div>
    
    <div class="form-group">
        <label for="shares">購買數量</label>
        <div style="display: flex; gap: 10px; width: 100%;">
            <input type="number" id="quantity" value="1" style="flex: 2;">
            <select id="unit" style="flex: 1; padding: 12px; font-size: 14px; background: white; border: 2px solid #e9ecef; border-radius: 12px;">
                <option value="1000" selected>張 (1000股)</option>
                <option value="1">股 (零股)</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>手續費折扣 (台灣一般券商)</label>
        <select id="discount" style="background: white;">
            <option value="1">不打折 (1.425‰)</option>
            <option value="0.6">6 折</option>
            <option value="0.28" selected>28 折 (網路下單)</option>
            <option value="0">免手續費 (純看價差)</option>
        </select>
    </div>

    <div class="result-card">
        <div class="result-row">
            <span class="result-label">帳面單股價差</span>
            <span id="priceDiff" class="result-value">0 元</span>
        </div>
        <div class="result-row">
            <span class="result-label">精準報酬率 (含稅費)</span>
            <span id="roi" class="result-value">0%</span>
        </div>
        <div class="result-row">
            <span class="result-label">預估淨獲利金額</span>
            <span id="netProfit" class="result-value profit" style="font-size: 24px;">0 元</span>
        </div>
    </div>
    
    <div class="footer">
        手續費 0.1425% (基本低消20元) | 證交稅 0.3%<br>
        麻糬祝你每檔都大賺！🐾
    </div>
</div>

<script>
    const buyPriceInput = document.getElementById('buyPrice');
    const sellPriceInput = document.getElementById('sellPrice');
    const quantityInput = document.getElementById('quantity');
    const unitSelect = document.getElementById('unit');
    const discountSelect = document.getElementById('discount');

    function calculate() {
        const buyPrice = parseFloat(buyPriceInput.value) || 0;
        const sellPrice = parseFloat(sellPriceInput.value) || 0;
        const quantity = parseFloat(quantityInput.value) || 0;
        const totalShares = quantity * parseInt(unitSelect.value);
        const discount = parseFloat(discountSelect.value);

        if (buyPrice <= 0 || sellPrice <= 0 || totalShares <= 0) {
            document.getElementById('priceDiff').innerText = '0 元';
            document.getElementById('roi').innerText = '0%';
            document.getElementById('netProfit').innerText = '0 元';
            document.getElementById('priceDiff').className = 'result-value';
            document.getElementById('netProfit').className = 'result-value profit';
            document.getElementById('roi').className = 'result-value';
            return;
        }

        const diff = sellPrice - buyPrice;
        const diffText = (diff >= 0 ? '+' : '') + diff.toFixed(2) + ' 元';
        document.getElementById('priceDiff').innerText = diffText;
        document.getElementById('priceDiff').className = 'result-value ' + (diff >= 0 ? 'profit' : 'loss');

        let buyFee = Math.floor(buyPrice * totalShares * 0.001425 * discount);
        if (buyFee < 20 && discount > 0) buyFee = 20;
        const totalCost = (buyPrice * totalShares) + buyFee;

        let sellFee = Math.floor(sellPrice * totalShares * 0.001425 * discount);
        if (sellFee < 20 && discount > 0) sellFee = 20;
        const tax = Math.floor(sellPrice * totalShares * 0.003);
        
        const totalRevenue = (sellPrice * totalShares) - sellFee - tax;

        const netProfit = totalRevenue - totalCost;
        const roi = (netProfit / totalCost) * 100;

        document.getElementById('netProfit').innerText = (netProfit >= 0 ? '+' : '') + netProfit.toLocaleString('zh-TW') + ' 元';
        const resultClass = netProfit >= 0 ? 'result-value profit' : 'result-value loss';
        document.getElementById('netProfit').className = resultClass + ' profit';
        document.getElementById('roi').className = resultClass;

        document.getElementById('roi').innerText = (roi >= 0 ? '+' : '') + roi.toFixed(2) + '%';
    }

    [buyPriceInput, sellPriceInput, quantityInput, unitSelect, discountSelect].forEach(element => {
        element.addEventListener('input', calculate);
    });

    calculate();
</script>

</body>
</html>
